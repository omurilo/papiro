name: Publish Papiro

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.26.1'  # Specify the Go version

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build -o papiro ./cmd/papiro/

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Publishing version ${{ github.ref }}"
          # Add your publishing logic here, e.g., upload to a release or a package registry
          gh release create ${{ github.ref }} papiro --title "Release ${{ github.ref }}"