<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Escritos - Papiro</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <header style="margin-top: 2rem;">
            <h1 style="font-size: 3rem; margin-bottom: 0;">📜 O Papiro</h1>
            <p style="color: #796e65; font-style: italic;">Um registro das minhas ideias.</p>
        </header>

        <main class="papiro-sheet">
            <ul class="post-list">
                {{range .Posts}}
                <li>
                    <span class="post-date">{{ date "02 Jan, 2006" .Meta.Date }}</span>
                    <a href="{{.URL}}" class="post-title">{{.Meta.Title}}</a>
                </li>
                {{end}}
            </ul>
        </main>

        <footer>
            <p>Gerado pelo motor <strong>Papiro</strong></p>
        </footer>
    </div>
</body>
</html>
