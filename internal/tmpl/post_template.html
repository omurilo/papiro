<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Meta.Title}}</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" style="border: none;">📜 Voltar aos Escritos</a>
        </nav>
        
        <article class="papiro-sheet">
            <header>
                <h1>{{.Meta.Title}}</h1>
                <div class="meta">
                    Registrado por {{.Meta.Author}} em {{ date "02 Jan, 2006" .Meta.Date}}
                </div>
            </header>

            <main class="content">
                {{.Content}} 
            </main>
        </article>

        <footer>
            <p>Gerado pelo motor <strong>Papiro</strong></p>
        </footer>
    </div>
</body>
</html>
